<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SauceFlow — Order Confirmation</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <div id="result-box"></div>
  </div>

  <script>
    const resultBox = document.getElementById("result-box");
    const raw = sessionStorage.getItem("orderResult");

    if (!raw) {
      window.location.href = "/";
    } else {
      const order = JSON.parse(raw);

      sessionStorage.removeItem("orderResult");

      if (order.status === "success") {
        const screenshotHtml = order.screenshot_path
          ? `<img src="/${order.screenshot_path}" alt="Order confirmation" />`
          : "";

        resultBox.innerHTML = `
          <div class="checkout-result success">
            <h1>Order placed!</h1>
            <p>Total paid: <strong>$${parseFloat(order.total).toFixed(2)}</strong></p>
            <p>The robot successfully completed the order on SauceDemo.</p>
            ${screenshotHtml}
            <br/>
            <a href="/" class="link-back">← New search</a>
          </div>`;
      } else {
        const errorMsg = order.error || "Unknown error during checkout.";

        resultBox.innerHTML = `
          <div class="checkout-result error">
            <h1>Order failed</h1>
            <p>${errorMsg}</p>
            <a href="/" class="link-back">← Try again</a>
          </div>`;
      }
    }
  </script>
</body>
</html>
