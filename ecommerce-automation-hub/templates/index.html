<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SauceFlow — Search Product</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Search Product</h1>

    <div id="error-box" class="error-msg" style="display:none;"></div>

    <form id="search-form">
      <div class="form-group">
        <label for="item">Product name</label>
        <input
          type="text"
          id="item"
          name="item"
          placeholder="e.g.: sauce labs backpack"
          required
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="max_price">Maximum price (USD)</label>
        <input
          type="number"
          id="max_price"
          name="max_price"
          placeholder="e.g.: 30"
          min="0.01"
          step="0.01"
          required
        />
      </div>

      <button type="submit" class="btn" id="submit-btn">Search</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("search-form");
    const submitBtn = document.getElementById("submit-btn");
    const errorBox = document.getElementById("error-box");

    const params = new URLSearchParams(window.location.search);
    const errorParam = params.get("error");
    if (errorParam) {
      errorBox.textContent = errorParam;
      errorBox.style.display = "block";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";

      const item = document.getElementById("item").value.trim();
      const max_price = parseFloat(document.getElementById("max_price").value);

      if (!item) {
        errorBox.textContent = "Please enter a product name.";
        errorBox.style.display = "block";
        return;
      }

      if (isNaN(max_price) || max_price <= 0) {
        errorBox.textContent = "Please enter a valid maximum price.";
        errorBox.style.display = "block";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Searching...";

      try {
        const response = await fetch("/run-search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ item, max_price }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to start the search.");
        }

        window.location.href = "/loading?id=" + encodeURIComponent(data.requestId);
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Search";
      }
    });
  </script>
</body>
</html>
